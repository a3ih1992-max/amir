name: Run Ajel24 Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تخزين Playwright مؤقتاً
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: تثبيت المكتبات
        run: |
          pip install playwright requests -q
          playwright install chromium
          playwright install-deps chromium

      - name: تشغيل البوت
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python ajel24_bot.py --once

      - name: رفع البوسترات
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "[email protected]"
          git reset HEAD .github/
          git add posters/ ajel24_history.json
          git diff --cached --quiet || git commit -m "تحديث الأخبار"
          git push --force origin main
